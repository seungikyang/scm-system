# MySQL 프로필 (SPRING_PROFILES_ACTIVE=mysql).
# docker-compose 의 db 서비스 또는 외부 MySQL 에 연결한다.
# 기본 application.yml(H2) 위에 datasource/jpa 일부를 덮어쓴다.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:scm}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:scm}
    password: ${DB_PASSWORD:scm}
  jpa:
    hibernate:
      ddl-auto: update        # MySQL 영속 DB: 스키마 유지하며 갱신 (시드는 최초 1회)
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: false          # MySQL 사용 시 H2 콘솔 비활성
